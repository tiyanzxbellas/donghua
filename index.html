<!DOCTYPE html><html lang="id" x-data="DongHuaApp()"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#080c14">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title x-text="pageTitle">DongHua — Nonton Sub Indo</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,600;0,9..40,800;1,9..40,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/all.min.css">
<link rel="stylesheet" href="css/styles.css">

<script defer="" src="js/cdn.min.js"></script>
<script defer="" src="js/cdn.min_1.js"></script>
<script src="js/app.js"></script>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div style="display:flex;flex-direction:column;align-items:center;gap:1rem;">
    <div class="splash-mark"><i class="fas fa-dragon"></i></div>
    <div class="splash-title">Dong<em>Hua</em></div>
  </div>
  <div class="splash-bar-wrap"><div class="splash-bar"></div></div>
</div>

<!-- DESKTOP HEADER -->
<header>
  <div class="hdr">
    <div class="logo" @click="go('home')">
      <div class="logo-mark"><i class="fas fa-dragon"></i></div>
      <span class="logo-text">Dong<em>Hua</em></span>
    </div>
    <nav class="nav-desktop">
      <template x-for="n in navLinks" :key="n.view">
        <a href="#" @click.prevent="go(n.view)" class="nav-link" :class="isActive(n.match)?'active':''">
          <i :class="n.icon" style="font-size:0.65rem;"></i>
          <span x-text="n.label"></span>
        </a>
      </template>
    </nav>
    <div class="hdr-actions">
      <button @click="showInfoModal=true" class="hdr-btn" title="Info"><i class="fas fa-info"></i></button>
      <button @click="go('schedule')" class="hdr-btn" title="Jadwal"><i class="fas fa-calendar-alt"></i></button>
      <div class="search-wrap" @click.away="showSuggestions=false">
        <div style="position:relative;">
          <input type="text" x-model="searchQuery" @input.debounce.300ms="fetchSuggestions()" @keyup.enter="startSearch()" @focus="suggestions.length>0&&(showSuggestions=true)" placeholder="Cari donghua…" class="search-input">
          <i class="fas fa-search search-icon"></i>
        </div>
        <div x-show="showSuggestions&&suggestions.length>0" x-transition="" x-cloak="" class="suggestions">
          <template x-for="s in suggestions" :key="s">
            <div @click="searchQuery=s;startSearch()" class="sug-item" x-text="s"></div>
          </template>
        </div>
      </div>
    </div>
  </div>
</header>

<!-- MOBILE HEADER -->
<div class="mobile-hdr">
  <div class="logo" @click="go('home')">
    <div class="logo-mark" style="width:32px;height:32px;"><i class="fas fa-dragon" style="font-size:0.75rem;"></i></div>
    <span class="logo-text" style="font-size:1.2rem;">Dong<em>Hua</em></span>
  </div>
  <div class="flex items-center gap-2">
    <button @click="showInfoModal=true" class="hdr-btn"><i class="fas fa-info"></i></button>
    <button @click="go('schedule')" class="hdr-btn"><i class="fas fa-calendar-alt"></i></button>
    <button @click="showSearch=!showSearch" class="hdr-btn"><i class="fas fa-search"></i></button>
  </div>
</div>

<!-- Mobile Search -->
<div x-show="showSearch" x-transition="" x-cloak="" class="mobile-search-bar" @click.away="showSuggestions=false">
  <div style="position:relative;">
    <input type="text" x-model="searchQuery" @input.debounce.300ms="fetchSuggestions()" @keyup.enter="startSearch();showSearch=false" @keyup.escape="showSearch=false" placeholder="Ketik judul donghua…" class="search-input" style="width:100%;border-radius:11px;" x-ref="mobSearch" x-effect="showSearch&&$nextTick(()=>$refs.mobSearch.focus())">
    <i class="fas fa-search search-icon"></i>
  </div>
  <div x-show="showSuggestions&&suggestions.length>0" class="suggestions" style="position:relative;top:8px;animation:none;">
    <template x-for="s in suggestions" :key="s">
      <div @click="searchQuery=s;startSearch();showSearch=false" class="sug-item" x-text="s"></div>
    </template>
  </div>
</div>

<!-- MAIN -->
<main>

  <!-- LOADING SKELETONS -->
  <div x-show="loading" x-cloak="">
    <template x-if="page==='home'">
      <div class="animate-pulse">
        <div class="skeleton" style="height:380px;border-radius:1.75rem;margin-bottom:4rem;"></div>
        <div class="flex gap-2 mb-4"><div class="skeleton" style="width:3px;height:24px;"></div><div class="skeleton" style="width:180px;height:20px;"></div></div>
        <div class="pop-grid mb-8">
          <template x-for="i in 5"><div class="skeleton" style="aspect-ratio:16/9;border-radius:0.875rem;"></div></template>
        </div>
        <div class="grid-poster">
          <template x-for="i in 6"><div class="skeleton" style="aspect-ratio:2/3;border-radius:1.25rem;"></div></template>
        </div>
      </div>
    </template>
    <template x-if="page!=='home'&&page!=='detail'&&page!=='results'">
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;gap:1rem;">
        <div class="spinner"></div>
        <div style="font-family:var(--font-display);font-size:2rem;font-weight:700;font-style:italic;color:var(--gold);" x-text="loadProgress+'%'"></div>
      </div>
    </template>
    <template x-if="page==='results'||page==='detail'">
      <div class="animate-pulse">
        <div class="skeleton" style="height:28px;width:200px;border-radius:7px;margin-bottom:2rem;"></div>
        <div class="grid-wide"><template x-for="i in 10"><div class="skeleton" style="aspect-ratio:2/3;border-radius:1.25rem;"></div></template></div>
      </div>
    </template>
  </div>

  <!-- CONTENT -->
  <div x-show="!loading">

    <!-- ========== HOME ========== -->
    <template x-if="page==='home'">
      <div>

        <!-- HERO SLIDER -->
        <div class="hero section" x-show="homeData.featuredSlider&&homeData.featuredSlider.length>0">
          <template x-for="(s,i) in homeData.featuredSlider" :key="i">
            <div class="hero-slide" x-show="sliderIndex===i" x-transition:enter="transition ease-out" x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100" x-transition:leave="transition ease-in" x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0" style="transition-duration:700ms;">
              <img :src="s.thumbnail" class="hero-img" loading="eager">
              <div class="hero-grad"></div>
              <div class="hero-glow"></div>
              <div class="hero-content" x-show="sliderIndex===i" x-transition:enter="transition ease-out" x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100" style="transition-duration:600ms;transition-delay:200ms;">
                <div class="hero-pill">
                  <div class="hero-dot"></div>
                  <span class="hero-pill-text">Featured Donghua</span>
                </div>
                <h2 class="hero-title" x-text="cleanTitle(s.title)"></h2>
                <p class="hero-desc" x-text="s.description"></p>
                <button @click="go('detail',s.url)" class="hero-btn">
                  <div class="hero-btn-play"><i class="fas fa-play" style="margin-left:1px;font-size:0.55rem;"></i></div>
                  Tonton Sekarang
                </button>
              </div>
            </div>
          </template>
          
          <div class="hero-dots">
            <template x-for="(s,i) in homeData.featuredSlider" :key="'d'+i">
              <div @click="sliderIndex=i" class="hero-dot-btn" :class="sliderIndex===i?'active':''"></div>
            </template>
          </div>
        </div>

        <!-- POPULER HARI INI -->
        <div class="section">
          <div class="sec-head">
            <div class="sec-ornament"><span class="bar-tall"></span><span class="bar-short"></span></div>
            <h3 class="sec-title"><i class="fas fa-fire"></i>Populer Hari Ini</h3>
          </div>
          <div class="pop-grid">
            <template x-for="(item,i) in (homeData.popularToday||[])" :key="'p'+i">
              <div @click="go('stream',item.url)" class="pop-card">
                <img :src="item.thumbnail" loading="lazy">
                <div class="pop-info">
                  <p class="pop-ep" x-text="item.episode"></p>
                  <p class="pop-title" x-text="cleanTitle(item.title)"></p>
                </div>
              </div>
            </template>
          </div>
        </div>

        <!-- REKOMENDASI -->
        <div class="section" x-show="homeData.recommendations&&homeData.recommendations.genres.length>0">
          <div class="sec-head">
            <div class="sec-ornament"><span class="bar-tall"></span><span class="bar-short"></span></div>
            <h3 class="sec-title"><i class="fas fa-star"></i>Rekomendasi</h3>
          </div>
          <div class="tabs">
            <template x-for="g in homeData.recommendations.genres" :key="g.id">
              <button @click="selectedRecTab=g.id" class="tab" :class="selectedRecTab===g.id?'active':''" x-text="g.name"></button>
            </template>
          </div>
          <template x-for="pane in homeData.recommendations.items" :key="'pane'+pane.id">
            <div x-show="selectedRecTab===pane.id" x-transition:enter="transition ease-out" x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100" style="transition-duration:350ms;" class="grid-poster">
              <template x-for="(item,i) in pane.list" :key="pane.id+i">
                <div @click="go('detail',item.url)" class="card">
                  <div class="card-thumb">
                    <img :src="item.thumbnail" loading="lazy">
                    <div class="card-badge" x-text="item.episode"></div>
                    <div class="card-overlay"><div class="card-play"><i class="fas fa-info"></i></div></div>
                  </div>
                  <div class="card-body"><p class="card-title" x-text="cleanTitle(item.title)"></p></div>
                </div>
              </template>
            </div>
          </template>
        </div>

        <!-- TOP DONGHUA -->
        <div class="section" x-show="homeData.animePopular&&homeData.animePopular.length>0">
          <div class="sec-head">
            <div class="sec-ornament"><span class="bar-tall"></span><span class="bar-short"></span></div>
            <h3 class="sec-title"><i class="fas fa-trophy"></i>Top Donghua</h3>
          </div>
          <div class="rank-row">
            <template x-for="(item,i) in homeData.animePopular" :key="'r'+i">
              <div @click="go('stream',item.url)" class="rank-card">
                <div class="rank-thumb">
                  <img :src="item.thumbnail" loading="lazy">
                  <div class="rank-num" x-text="item.rank"></div>
                  <div class="rank-score"><i class="fas fa-star" style="font-size:0.45rem;"></i><span x-text="item.rating.replace(/[^0-9.]/g,'')"></span></div>
                </div>
                <p class="rank-title" x-text="item.title"></p>
              </div>
            </template>
          </div>
        </div>

        <!-- UPDATE TERBARU + SIDEBAR -->
        <div style="display:flex;flex-direction:column;gap:2rem;margin-bottom:3.5rem;" class="md:flex-row">
          <div style="flex:1;min-width:0;">
            <div class="sec-head">
              <div class="sec-ornament"><span class="bar-tall"></span><span class="bar-short"></span></div>
              <h3 class="sec-title"><i class="fas fa-clock"></i>Update Terbaru</h3>
            </div>
            <div class="grid-wide">
              <template x-for="(item,i) in (homeData.latestReleases||[])" :key="'l'+i">
                <div @click="go('stream',item.url)" class="card">
                  <div class="card-thumb">
                    <img :src="item.thumbnail" loading="lazy">
                    <div class="card-badge" x-text="item.episode"></div>
                    <div class="card-overlay"><div class="card-play"><i class="fas fa-play" style="margin-left:1px;font-size:0.7rem;"></i></div></div>
                  </div>
                  <div class="card-body"><p class="card-title" x-text="cleanTitle(item.title)"></p></div>
                </div>
              </template>
            </div>
          </div>
          <div style="width:100%;" class="md:block">
            <div class="sidebar">
              <div class="sidebar-title"><i class="fas fa-broadcast-tower"></i>Ongoing Series</div>
              <div style="max-height:480px;overflow-y:auto;">
                <template x-for="(item,i) in (homeData.ongoingSidebar||[])" :key="'s'+i">
                  <div @click="go('stream',item.url)" class="side-item">
                    <div style="flex:1;min-width:0;">
                      <p class="side-title" x-text="cleanTitle(item.title)"></p>
                      <p class="side-ep" x-text="item.episode"></p>
                    </div>
                    <i class="fas fa-chevron-right" style="font-size:0.55rem;color:var(--w20);flex-shrink:0;"></i>
                  </div>
                </template>
              </div>
            </div>
          </div>
        </div>

      </div>
    </template>

    <!-- ========== GENRES ========== -->
    <template x-if="page==='genres'">
      <div style="max-width:960px;margin:0 auto;">
        <div style="text-align:center;margin-bottom:3rem;">
          <h2 style="font-family:var(--font-display);font-size:3rem;font-weight:700;font-style:italic;color:var(--w100);">Jelajahi <em style="color:var(--gold);">Genre</em></h2>
          <p style="font-size:0.8rem;color:var(--w40);margin-top:0.5rem;">Temukan donghua favoritmu berdasarkan genre</p>
        </div>
        <div class="genre-grid">
          <template x-for="g in allGenres" :key="g.slug">
            <button @click="go('genre',g.slug)" class="genre-card">
              <i class="fas fa-scroll" style="font-size:0.62rem;opacity:0.5;"></i>
              <span x-text="g.name"></span>
            </button>
          </template>
        </div>
      </div>
    </template>

    <!-- ========== RESULTS ========== -->
    <template x-if="page==='results'">
      <div>
        <div class="flex items-center justify-between mb-8 flex-wrap gap-3">
          <h2 style="font-family:var(--font-display);font-size:1.75rem;font-weight:700;font-style:italic;color:var(--w100);" x-text="searchTitle"></h2>
          <div style="font-size:0.62rem;font-weight:800;text-transform:uppercase;letter-spacing:0.12em;color:var(--w30);background:var(--ink-card);padding:0.3rem 0.75rem;border-radius:7px;border:1px solid var(--border-soft);">Hal. <span x-text="currentPage"></span></div>
        </div>
        <div x-show="listData.length===0" class="empty">
          <div class="empty-ico"><i class="fas fa-search"></i></div>
          <p class="empty-t">Tidak ditemukan</p>
          <p class="empty-s">Coba gunakan kata kunci yang berbeda.</p>
        </div>
        <div x-show="listData.length>0" class="grid-wide">
          <template x-for="(item,i) in listData" :key="'r'+i">
            <div @click="go('detail',item.url)" class="card">
              <div class="card-thumb">
                <img :src="item.thumbnail" loading="lazy">
                <div class="card-badge new" x-text="item.type"></div>
                <div class="card-overlay"><div class="card-play"><i class="fas fa-info"></i></div></div>
              </div>
              <div class="card-body">
                <p class="card-title" x-text="cleanTitle(item.title)"></p>
                <div class="flex items-center justify-between mt-2">
                  <span style="font-size:0.58rem;background:var(--w04);color:var(--w40);padding:0.18rem 0.45rem;border-radius:5px;font-weight:700;text-transform:uppercase;" x-text="item.status"></span>
                  <span style="font-size:0.58rem;color:var(--gold);font-weight:700;" x-text="item.episode"></span>
                </div>
              </div>
            </div>
          </template>
        </div>
        <div x-show="listData.length>0" class="pagination">
          <button @click="changePage(currentPage-1)" :disabled="currentPage<=1||loading" class="page-btn"><i class="fas fa-arrow-left"></i></button>
          <div class="page-cur"><i class="fas fa-book" style="margin-right:0.35rem;font-size:0.62rem;"></i>Halaman <span x-text="currentPage"></span></div>
          <button @click="changePage(currentPage+1)" :disabled="!hasNextPage||loading" class="page-btn"><i class="fas fa-arrow-right"></i></button>
        </div>
      </div>
    </template>

    <!-- ========== DETAIL ========== -->
    <template x-if="page==='detail'">
      <div class="detail-wrap">
        <!-- Poster -->
        <div class="detail-poster">
          <div class="poster-img"><img :src="animeDetail.thumbnail" loading="lazy"></div>
          <div class="meta-box">
            <div class="meta-row">
              <div class="rating-big"><i class="fas fa-star" style="font-size:1rem;"></i><span x-text="animeDetail.rating"></span></div>
              <div class="type-tag" x-text="animeDetail.metadata?.type||'Donghua'"></div>
            </div>
            <div style="display:flex;flex-direction:column;gap:0.55rem;padding-top:0.625rem;border-top:1px solid var(--border-soft);">
              <div>
                <div class="meta-label"><i class="fas fa-signal" style="font-size:0.55rem;"></i>Status</div>
                <div class="meta-val" x-text="animeDetail.metadata?.status||'-'"></div>
              </div>
              <div>
                <div class="meta-label"><i class="fas fa-building" style="font-size:0.55rem;"></i>Studio</div>
                <div class="meta-val" x-text="animeDetail.metadata?.studio||'-'"></div>
              </div>
              <div>
                <div class="meta-label"><i class="fas fa-sync" style="font-size:0.55rem;"></i>Update</div>
                <div class="meta-val" x-text="animeDetail.metadata?.updated_on||'-'"></div>
              </div>
            </div>
          </div>
        </div>
        <!-- Info -->
        <div class="detail-main">
          <button @click="prevPage==='results'?window.history.back():go('home')" class="back-btn">
            <i class="fas fa-arrow-left"></i>
            <span x-text="prevPage==='results'?'Kembali':'Beranda'"></span>
          </button>
          <h1 class="detail-title" x-text="animeDetail.title"></h1>
          <div class="flex flex-wrap gap-2 mb-6">
            <template x-for="g in animeDetail.genres" :key="g">
              <button @click="go('genre',g.toLowerCase().replace(/\s+/g,'-'))" class="genre-tag" x-text="g"></button>
            </template>
          </div>
          <div class="synopsis-box">
            <div class="synopsis-label"><i class="fas fa-scroll"></i>Sinopsis</div>
            <p class="synopsis-text" x-text="animeDetail.synopsis"></p>
          </div>
          <div class="flex items-center justify-between mb-4">
            <h3 style="font-size:0.78rem;font-weight:800;text-transform:uppercase;letter-spacing:0.12em;color:var(--w90);"><i class="fas fa-list" style="color:var(--gold);margin-right:0.4rem;"></i>Daftar Episode</h3>
            <button @click="epSort=(epSort==='desc'?'asc':'desc')" class="btn-ghost" style="padding:0.35rem 0.75rem;font-size:0.62rem;">
              <i class="fas fa-sort-amount-down-alt"></i>
              <span x-text="epSort==='desc'?'Terbaru':'Terlama'"></span>
            </button>
          </div>
          <div class="ep-grid">
            <template x-for="ep in (epSort==='desc'?(animeDetail.episodeList||[]):[...(animeDetail.episodeList||[])].reverse())" :key="ep.url">
              <div @click="go('stream',ep.url)" class="ep-btn">
                <i class="fas fa-play" style="font-size:0.45rem;opacity:0.4;"></i>
                <span x-text="ep.episode||ep.episode_number"></span>
              </div>
            </template>
          </div>
        </div>
      </div>
    </template>

    <!-- ========== STREAM ========== -->
    <template x-if="page==='stream'">
      <div style="max-width:880px;margin:0 auto;">
        <div style="margin-bottom:0.5rem;">
          <h1 style="font-family:var(--font-display);font-size:1.5rem;font-weight:700;font-style:italic;color:var(--w100);" x-text="streamData.title"></h1>
        </div>
        <button @click="go('detail',streamData.navigation?.allEpisodes||streamData.series_url)" class="back-btn" style="margin-bottom:1.1rem;">
          <i class="fas fa-arrow-left"></i><span>Semua Episode</span>
        </button>
        <div class="player-wrap">
          <iframe :src="activeServer" allowfullscreen="" frameborder="0" :sandbox="adBlocker?'allow-forms allow-scripts allow-pointer-lock allow-same-origin allow-presentation':null"></iframe>
        </div>
        <div class="server-row">
          <template x-for="(srv,si) in (streamData.streamingLinks||[])" :key="'srv'+si">
            <button @click="changeServer(srv.link||srv,srv.server,srv.isProxy)" class="srv-pill" :class="preferredServerHost===srv.server?'active':''">
              <i class="fas fa-server" style="font-size:0.52rem;opacity:0.6;"></i>
              <span x-text="srv.server"></span>
            </button>
          </template>
        </div>
        <div class="nav-ctrls">
          <button @click="go('stream',streamData.navigation?.prevEpisode)" :disabled="!streamData.navigation?.prevEpisode" class="nav-btn prev"><i class="fas fa-step-backward"></i> Sebelumnya</button>
          <button @click="go('detail',streamData.navigation?.allEpisodes)" class="nav-btn all"><i class="fas fa-th-list"></i> Semua Eps</button>
          <button @click="go('stream',streamData.navigation?.nextEpisode)" :disabled="!streamData.navigation?.nextEpisode" class="nav-btn next">Selanjutnya <i class="fas fa-step-forward"></i></button>
        </div>
        <button @click="openComments()" style="width:100%;background:var(--ink-card);border:1px solid var(--border-soft);border-radius:var(--r-lg);padding:0.875rem;display:flex;align-items:center;justify-content:center;gap:0.625rem;color:var(--w60);cursor:pointer;transition:all 0.2s;font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:1.25rem;" onmouseenter="this.style.borderColor='var(--border)';this.style.color='var(--w90)';" onmouseleave="this.style.borderColor='';this.style.color='';">
          <i class="fas fa-comments" style="color:var(--gold);"></i>Diskusi & Komentar
        </button>
        <div class="dl-box">
          <h3 style="font-size:0.72rem;font-weight:800;text-transform:uppercase;letter-spacing:0.14em;color:var(--w90);margin-bottom:1rem;display:flex;align-items:center;gap:0.4rem;">
            <i class="fas fa-download" style="color:var(--gold);"></i>Link Download
          </h3>
          <template x-for="(dl,di) in (streamData.downloadLinks||[])" :key="'dl'+di">
            <div class="dl-row">
              <div class="dl-quality" x-text="dl.quality"></div>
              <div class="dl-links">
                <template x-for="(lnk,li) in (dl.links||[])" :key="'l'+di+li">
                  <a :href="lnk.link" target="_blank" class="dl-btn">
                    <i class="fas fa-cloud-download-alt" style="opacity:0.5;font-size:0.58rem;"></i>
                    <span x-text="lnk.host"></span>
                  </a>
                </template>
              </div>
            </div>
          </template>
        </div>
      </div>
    </template>

    <!-- ========== HISTORY ========== -->
    <template x-if="page==='history'">
      <div class="max-w-2xl mx-auto">
        <div class="flex items-center justify-between mb-8 flex-wrap gap-3">
          <div class="flex items-center gap-3">
            <div style="width:44px;height:44px;background:var(--gold-ghost);border:1px solid var(--border);border-radius:14px;display:flex;align-items:center;justify-content:center;"><i class="fas fa-history" style="color:var(--gold);font-size:1.1rem;"></i></div>
            <div>
              <h2 style="font-family:var(--font-display);font-size:1.75rem;font-weight:700;font-style:italic;">Riwayat Nonton</h2>
              <p style="font-size:0.62rem;color:var(--w30);font-weight:600;margin-top:0.1rem;" x-text="watchHistory.length+' dari 20 tersimpan'"></p>
            </div>
          </div>
          <div class="flex flex-wrap gap-2">
            <button @click="go('trash')" class="icon-btn"><i class="fas fa-trash-alt"></i>Sampah<span x-show="trashHistory.length>0" style="background:#dc2626;color:white;font-size:0.5rem;padding:0.1rem 0.3rem;border-radius:99px;margin-left:0.25rem;" x-text="trashHistory.length"></span></button>
            <button @click="exportHistory()" class="icon-btn"><i class="fas fa-file-export"></i>Export</button>
            <label class="icon-btn cursor-pointer"><i class="fas fa-file-import"></i>Import<input type="file" accept=".json" style="display:none;" @change="importHistory($event)"></label>
            <button x-show="watchHistory.length>0" @click="confirmClearHistory()" class="icon-btn" style="color:#f87171;"><i class="fas fa-broom"></i>Bersihkan</button>
          </div>
        </div>
        <div x-show="watchHistory.length===0" class="empty">
          <div class="empty-ico"><i class="fas fa-film"></i></div>
          <p class="empty-t">Belum ada riwayat</p>
          <p class="empty-s">Mulai nonton donghua favoritmu dan riwayatnya akan muncul di sini.</p>
          <button @click="go('home')" class="btn-gold"><i class="fas fa-compass"></i>Jelajahi Sekarang</button>
        </div>
        <div x-show="watchHistory.length>0" class="space-y-2">
          <template x-for="(item,i) in watchHistory" :key="item.seriesTitle+i">
            <div class="hist-item" @click="let u=item.slug||item.url;if(!u.startsWith('http'))u=baseUrl.replace(/\/$/,'')+(u.startsWith('/')?'':'/')+u;go('stream',u)">
              <div class="hist-num" x-text="i+1"></div>
              <div style="flex:1;min-width:0;">
                <p class="hist-title" x-text="item.seriesTitle"></p>
                <div class="flex items-center gap-2 mt-1">
                  <template x-if="item.epNum">
                    <span style="background:var(--gold);color:var(--ink);font-size:0.52rem;font-weight:900;padding:0.15rem 0.45rem;border-radius:5px;text-transform:uppercase;" x-text="item.epNum"></span>
                  </template>
                </div>
              </div>
              <div>
                <p class="hist-date" x-text="formatDate(item.watchedAt)"></p>
              </div>
              <div class="flex items-center gap-2">
                <button @click.stop="confirmRemoveHistory(i)" style="width:30px;height:30px;background:rgba(192,57,43,0.08);border:1px solid rgba(192,57,43,0.2);border-radius:8px;color:#f87171;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:0.68rem;transition:all 0.2s;" onmouseenter="this.style.background='#dc2626';this.style.color='white';" onmouseleave="this.style.background='rgba(192,57,43,0.08)';this.style.color='#f87171';"><i class="fas fa-times"></i></button>
                <div style="width:30px;height:30px;background:var(--gold);border-radius:8px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(201,168,76,0.35);"><i class="fas fa-play" style="font-size:0.55rem;color:var(--ink);margin-left:1px;"></i></div>
              </div>
            </div>
          </template>
        </div>
      </div>
    </template>

    <!-- ========== TRASH ========== -->
    <template x-if="page==='trash'">
      <div class="max-w-2xl mx-auto">
        <div class="flex items-center justify-between mb-8 flex-wrap gap-3">
          <div class="flex items-center gap-3">
            <div style="width:44px;height:44px;background:rgba(192,57,43,0.08);border:1px solid rgba(192,57,43,0.2);border-radius:14px;display:flex;align-items:center;justify-content:center;"><i class="fas fa-trash-alt" style="color:#f87171;font-size:1.1rem;"></i></div>
            <div>
              <h2 style="font-family:var(--font-display);font-size:1.75rem;font-weight:700;font-style:italic;">Tong Sampah</h2>
              <p style="font-size:0.62rem;color:var(--w30);font-weight:600;margin-top:0.1rem;">Tersimpan 3 hari sebelum dihapus permanen</p>
            </div>
          </div>
          <div class="flex flex-wrap gap-2">
            <button @click="go('history')" class="icon-btn"><i class="fas fa-arrow-left"></i>Kembali</button>
            <button x-show="trashHistory.length>0" @click="restoreAllTrash()" class="icon-btn" style="color:var(--gold);"><i class="fas fa-undo"></i>Restore Semua</button>
            <button x-show="trashHistory.length>0" @click="confirmEmptyTrash()" class="icon-btn" style="color:#f87171;"><i class="fas fa-fire-alt"></i>Kosongkan</button>
          </div>
        </div>
        <div x-show="trashHistory.length===0" class="empty">
          <div class="empty-ico"><i class="fas fa-trash"></i></div>
          <p class="empty-t">Tong sampah kosong</p>
          <p class="empty-s">History yang dihapus akan muncul di sini selama 3 hari.</p>
        </div>
        <div x-show="trashHistory.length>0" class="space-y-2">
          <template x-for="(item,i) in trashHistory" :key="item.seriesTitle+i">
            <div class="trash-item">
              <div style="width:30px;height:30px;background:rgba(192,57,43,0.08);border:1px solid rgba(192,57,43,0.2);border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;"><i class="fas fa-trash-alt" style="color:rgba(192,57,43,0.5);font-size:0.62rem;"></i></div>
              <div style="flex:1;min-width:0;">
                <p style="font-size:0.78rem;font-weight:600;color:var(--w40);display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden;" x-text="item.seriesTitle"></p>
                <div class="flex items-center gap-2 mt-1">
                  <template x-if="item.epNum"><span style="background:rgba(255,255,255,0.06);color:var(--w40);font-size:0.52rem;font-weight:800;padding:0.12rem 0.4rem;border-radius:5px;text-transform:uppercase;" x-text="item.epNum"></span></template>
                  <span style="font-size:0.58rem;color:rgba(192,57,43,0.5);font-weight:700;" x-text="'Hapus '+formatDate(item.deletedAt)"></span>
                </div>
              </div>
              <div class="flex items-center gap-2">
                <button @click="restoreFromTrash(i)" class="btn-gold" style="font-size:0.58rem;padding:0.35rem 0.75rem;gap:0.3rem;"><i class="fas fa-undo" style="font-size:0.52rem;"></i>Restore</button>
                <button @click="confirmDeletePermanent(i)" style="width:30px;height:30px;background:rgba(192,57,43,0.08);border:1px solid rgba(192,57,43,0.2);border-radius:8px;color:#f87171;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:0.68rem;" onmouseenter="this.style.background='#dc2626';this.style.color='white';" onmouseleave="this.style.background='rgba(192,57,43,0.08)';this.style.color='#f87171';"><i class="fas fa-times"></i></button>
              </div>
            </div>
          </template>
        </div>
      </div>
    </template>

    <!-- SCHEDULE PANEL -->
    <div x-show="showSchedulePanel" x-cloak="" class="side-overlay" @click="showSchedulePanel=false"></div>
    <div class="side-panel" :class="showSchedulePanel?'open':''">
      <div style="padding:1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--ink-card);flex-shrink:0;">
        <h2 style="font-size:0.78rem;font-weight:800;text-transform:uppercase;letter-spacing:0.14em;display:flex;align-items:center;gap:0.625rem;"><i class="fas fa-calendar-alt" style="color:var(--gold);"></i>Jadwal Rilis</h2>
        <div class="flex gap-2">
          <button @click="fetchSchedule(true)" class="hdr-btn"><i class="fas fa-sync-alt" :class="loading?'animate-pulse':''"></i></button>
          <button @click="showSchedulePanel=false" class="hdr-btn" style="color:#f87171;"><i class="fas fa-times"></i></button>
        </div>
      </div>
      <div style="padding:0.875rem;background:var(--ink);border-bottom:1px solid var(--border);flex-shrink:0;">
        <select x-model="selectedScheduleDay" style="width:100%;background:var(--ink-card);border:1px solid var(--border);border-radius:10px;padding:0.6rem 0.875rem;font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--w70);outline:none;font-family:var(--font-body);">
          <option value="all">Semua Hari</option>
          <option value="Monday">Senin</option><option value="Tuesday">Selasa</option>
          <option value="Wednesday">Rabu</option><option value="Thursday">Kamis</option>
          <option value="Friday">Jumat</option><option value="Saturday">Sabtu</option>
          <option value="Sunday">Minggu</option>
        </select>
      </div>
      <div style="flex:1;overflow-y:auto;padding:0.875rem;">
        <template x-for="day in (selectedScheduleDay==='all'?scheduleData:scheduleData.filter(d=>d.day===selectedScheduleDay))" :key="day.day">
          <div style="margin-bottom:1.5rem;">
            <div style="display:flex;align-items:center;gap:0.625rem;margin-bottom:0.625rem;">
              <span style="font-size:0.62rem;font-weight:800;text-transform:uppercase;letter-spacing:0.16em;color:var(--gold);" x-text="translateDay(day.day)"></span>
              <div style="flex:1;height:1px;background:var(--border-soft);"></div>
              <span style="font-size:0.58rem;font-weight:700;color:var(--w20);" x-text="day.totalCount+' Series'"></span>
            </div>
            <template x-for="item in day.list" :key="item.title">
              <div @click="showSchedulePanel=false;go('detail',item.url)" class="sch-item">
                <div class="sch-thumb"><img :src="item.thumbnail" loading="lazy"></div>
                <div style="flex:1;min-width:0;">
                  <p class="sch-title" x-text="cleanTitle(item.title)"></p>
                  <div style="display:flex;align-items:center;justify-content:space-between;margin-top:0.35rem;">
                    <p style="font-size:0.58rem;color:var(--w30);font-weight:700;display:flex;align-items:center;gap:0.2rem;"><i class="far fa-clock" style="font-size:0.52rem;"></i><span x-text="item.releaseTime"></span></p>
                    <template x-if="item.nextEpisode&&item.nextEpisode!=='??'">
                      <span style="font-size:0.52rem;padding:0.12rem 0.4rem;border-radius:5px;font-weight:800;background:var(--gold-ghost);color:var(--gold);border:1px solid var(--border);" x-text="'EP '+item.nextEpisode"></span>
                    </template>
                  </div>
                </div>
              </div>
            </template>
          </div>
        </template>
      </div>
    </div>

  </div><!-- /content -->
</main>

<!-- FOOTER -->
<footer x-show="!loading" x-cloak="" style="max-width:1400px;margin:0 auto;padding:1.25rem;border-top:1px solid var(--border-soft);text-align:center;position:relative;z-index:1;">
  <div style="display:flex;align-items:center;justify-content:center;gap:0.5rem;margin-bottom:0.5rem;">
    <div style="height:1px;width:40px;background:linear-gradient(to right,transparent,var(--border));"></div>
    <i class="fas fa-dragon" style="color:var(--gold);font-size:0.7rem;opacity:0.5;"></i>
    <div style="height:1px;width:40px;background:linear-gradient(to left,transparent,var(--border));"></div>
  </div>
  <p style="font-size:0.62rem;font-weight:600;color:var(--w20);letter-spacing:0.12em;text-transform:uppercase;">
    Error atau bug? Hubungi <a href="https://wa.me/6285196287445" target="_blank" style="color:var(--gold);text-decoration:none;">WhatsApp</a>
  </p>
</footer>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <template x-for="n in navLinks.filter(x=>x.mobile)" :key="'bn'+n.view">
    <div @click="go(n.view)" class="bnav-item" :class="isActive(n.match)?'active':''">
      <span style="position:relative;">
        <i :class="n.icon+' bnav-ico'"></i>
        <span x-show="n.view==='history'&&watchHistory.length>0" style="position:absolute;top:-5px;right:-9px;background:var(--gold);color:var(--ink);font-size:0.48rem;font-weight:900;padding:0.08rem 0.3rem;border-radius:99px;" x-text="watchHistory.length"></span>
      </span>
      <span class="bnav-lbl" x-text="n.label"></span>
    </div>
  </template>
</nav>

<!-- CONFIRM MODAL -->
<div x-show="confirmModal.show" x-cloak="" class="confirm-overlay" @click.self="confirmModal.show=false">
  <div class="confirm-box">
    <div style="display:flex;align-items:center;gap:0.75rem;margin-bottom:1.1rem;">
      <div style="width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;" :style="confirmModal.danger?'background:rgba(192,57,43,0.1);border:1px solid rgba(192,57,43,0.25);':'background:var(--gold-ghost);border:1px solid var(--border);'">
        <i :class="confirmModal.danger?'fas fa-exclamation-triangle':'fas fa-question-circle'" :style="confirmModal.danger?'color:#f87171;font-size:1rem;':'color:var(--gold);font-size:1rem;'"></i>
      </div>
      <div>
        <h3 style="font-weight:800;color:var(--w100);font-size:0.9rem;line-height:1.3;" x-text="confirmModal.title"></h3>
        <p style="font-size:0.65rem;color:var(--w30);font-weight:600;margin-top:0.1rem;" x-text="confirmModal.subtitle"></p>
      </div>
    </div>
    <p style="font-size:0.78rem;color:var(--w70);line-height:1.65;margin-bottom:1.25rem;" x-text="confirmModal.message"></p>
    <div style="display:flex;gap:0.625rem;">
      <button @click="confirmModal.show=false" class="btn-ghost" style="flex:1;"><i class="fas fa-times"></i>Batal</button>
      <button @click="confirmModal.action();confirmModal.show=false" style="flex:1;padding:0.65rem;border-radius:10px;font-weight:800;font-size:0.68rem;text-transform:uppercase;letter-spacing:0.1em;border:none;cursor:pointer;transition:all 0.2s;color:white;" :style="confirmModal.danger?'background:#dc2626;':'background:var(--gold);color:var(--ink);'" x-text="confirmModal.confirmText"></button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div x-show="importToast.show" x-cloak="" x-transition="" class="toast" :style="importToast.ok?'background:#16a34a;color:white;':'background:#dc2626;color:white;'">
  <i :class="importToast.ok?'fas fa-check-circle':'fas fa-times-circle'"></i>
  <span x-text="importToast.msg"></span>
</div>

<!-- INFO MODAL -->
<div x-show="showInfoModal" x-cloak="" class="confirm-overlay" @click.self="showInfoModal=false">
  <div class="confirm-box" style="border-color:var(--border);">
    <div style="display:flex;align-items:center;gap:0.75rem;margin-bottom:1.1rem;">
      <div style="width:40px;height:40px;background:var(--gold-ghost);border:1px solid var(--border);border-radius:12px;display:flex;align-items:center;justify-content:center;">
        <i class="fas fa-info-circle" style="color:var(--gold);font-size:1rem;"></i>
      </div>
      <div>
        <h3 style="font-weight:800;color:var(--w100);font-size:0.9rem;">Optimasi Server</h3>
        <p style="font-size:0.58rem;font-weight:800;text-transform:uppercase;letter-spacing:0.12em;color:var(--gold);margin-top:0.1rem;">Tips Streaming</p>
      </div>
    </div>
    <p style="font-size:0.8rem;color:var(--w70);line-height:1.7;margin-bottom:1.25rem;">Jika tersedia pilihan server bertanda <b style="color:var(--w100);">JANSEN.TV</b>, sangat disarankan untuk menggunakannya terlebih dahulu karena sudah dioptimalkan untuk kualitas terbaik.</p>
    <button @click="showInfoModal=false" class="btn-gold" style="width:100%;">Siap, Mengerti!</button>
  </div>
</div>

<!-- COMMENTS MODAL -->
<div x-show="showComments" x-cloak="" class="modal-overlay" @click.self="showComments=false">
  <div class="modal-panel" style="max-width:620px;">
    <div class="modal-hdr">
      <div style="display:flex;align-items:center;gap:0.75rem;">
        <div style="width:38px;height:38px;background:var(--gold);border-radius:11px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(201,168,76,0.4);"><i class="fas fa-comments" style="color:var(--ink);font-size:0.85rem;"></i></div>
        <h4 style="font-size:0.82rem;font-weight:800;text-transform:uppercase;letter-spacing:0.1em;color:var(--w100);">Komentar & Diskusi</h4>
      </div>
      <button @click="showComments=false" class="modal-close"><i class="fas fa-times"></i></button>
    </div>
    <div style="flex:1;overflow-y:auto;padding:1.1rem;">
      <template x-if="commentsLoading">
        <div style="display:flex;flex-direction:column;align-items:center;padding:2.5rem;gap:0.625rem;">
          <div class="spinner" style="width:30px;height:30px;border-width:2px;"></div>
          <p style="font-size:0.68rem;font-weight:800;text-transform:uppercase;color:var(--w30);">Memuat diskusi…</p>
        </div>
      </template>
      <template x-if="!commentsLoading&&commentsList.length===0">
        <div class="empty" style="padding:2rem;">
          <div class="empty-ico" style="font-size:1.4rem;"><i class="fas fa-comment-slash"></i></div>
          <p class="empty-t" style="font-size:0.82rem;">Belum ada komentar</p>
          <p class="empty-s">Jadilah yang pertama berdiskusi!</p>
        </div>
      </template>
      <template x-for="c in commentsList" :key="c.id">
        <div class="comment-item">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:0.35rem;">
            <span class="comment-name" x-text="c.name"></span>
            <span class="comment-time" x-text="formatDate(c.timestamp,'short')"></span>
          </div>
          <p class="comment-text" x-text="c.text"></p>
          <button @click="replyTo=c;$nextTick(()=>$refs.commentInput.focus())" style="font-size:0.62rem;font-weight:800;color:var(--w30);background:none;border:none;cursor:pointer;text-transform:uppercase;letter-spacing:0.08em;transition:color 0.2s;margin-top:0.5rem;" onmouseenter="this.style.color='var(--gold)';" onmouseleave="this.style.color='';">Balas</button>
        </div>
      </template>
    </div>
    <div style="padding:0.875rem;border-top:1px solid var(--border);flex-shrink:0;background:var(--ink-mid);">
      <template x-if="!commentName">
        <div style="margin-bottom:0.625rem;">
          <p style="font-size:0.62rem;font-weight:700;color:var(--w30);text-transform:uppercase;margin-bottom:0.35rem;">Nama Anda:</p>
          <input type="text" x-model="tempName" placeholder="Contoh: DragonWatcher" style="width:100%;background:var(--ink-card);border:1px solid var(--border-soft);border-radius:9px;padding:0.5rem 0.8rem;font-size:0.78rem;color:var(--w90);outline:none;font-family:var(--font-body);">
        </div>
      </template>
      <div x-show="replyTo" style="margin-bottom:0.4rem;display:flex;align-items:center;justify-content:space-between;background:var(--gold-ghost);border:1px solid var(--border);border-radius:9px;padding:0.35rem 0.625rem;">
        <span style="font-size:0.68rem;font-weight:700;color:var(--gold);" x-text="'Membalas '+replyTo?.name"></span>
        <button @click="replyTo=null" style="color:var(--w30);background:none;border:none;cursor:pointer;font-size:0.75rem;"><i class="fas fa-times"></i></button>
      </div>
      <div style="display:flex;gap:0.4rem;">
        <textarea x-ref="commentInput" x-model="newCommentText" rows="2" placeholder="Tulis komentar…" style="flex:1;background:var(--ink-card);border:1px solid var(--border-soft);border-radius:11px;padding:0.55rem 0.8rem;font-size:0.78rem;color:var(--w90);outline:none;resize:none;font-family:var(--font-body);"></textarea>
        <button @click="postComment()" :disabled="!newCommentText.trim()||(!commentName&&!tempName.trim())" class="btn-gold" style="padding:0.55rem 0.875rem;" :style="!newCommentText.trim()||(!commentName&&!tempName.trim())?'opacity:0.3;cursor:not-allowed;':''"><i class="fas fa-paper-plane"></i></button>
      </div>
    </div>
  </div>
</div>


</body></html>
